<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#f4d9df" />
  <title>玉环·巧解</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="chapterScreen" class="screen chapter-screen active" aria-label="章节选择">
      <div class="scene-bg chapter-bg"></div>
      <div class="screen-shade"></div>
      <header class="chapter-header ornate-plaque">
        <div class="brand-lantern">玉环<br>巧解</div>
        <div>
          <p class="eyebrow">YU HUAN · QIAO JIE</p>
          <h1>章节选择</h1>
          <div class="progress-badge">总进度：<strong id="totalProgress">0 / 88</strong></div>
        </div>
      </header>
      <main class="chapter-content">
        <div id="chapterGrid" class="chapter-grid"></div>
        <h2 class="series-title">更多系列 · 敬请期待</h2>
        <div class="future-series">
          <article class="future-card dunhuang"><b>敦煌系列</b><span>🔒 未解锁</span></article>
          <article class="future-card palace"><b>故宫系列</b><span>🔒 未解锁</span></article>
          <article class="future-card shanhai"><b>山海经系列</b><span>🔒 未解锁</span></article>
          <article class="future-card solar"><b>二十四节气</b><span>🔒 未解锁</span></article>
        </div>
      </main>
      <nav class="bottom-nav" aria-label="底部导航">
        <button class="active">章节</button><button>每日挑战</button><button>收藏</button>
      </nav>
    </section>

    <section id="levelScreen" class="screen level-screen" aria-label="关卡选择">
      <div class="scene-bg" id="levelBg"></div><div class="screen-shade"></div>
      <header class="sub-header ornate-plaque">
        <button id="levelBack" class="round-button" aria-label="返回">‹</button>
        <div><p class="eyebrow" id="levelChapterNo">第一章</p><h1 id="levelChapterTitle">桃天草莓晶</h1></div>
        <div class="ring-mini" id="levelRingMini"></div>
      </header>
      <main class="level-content">
        <div id="levelGrid" class="level-grid"></div>
      </main>
    </section>

    <section id="gameScreen" class="screen game-screen" aria-label="游戏">
      <div class="scene-bg" id="gameBg"></div><div class="screen-shade game-shade"></div>
      <header class="game-header">
        <div class="brand-lantern small">玉环<br>巧解</div>
        <div class="title-plaque ornate-plaque">
          <p id="gameChapterLabel">第一章 · 桃天草莓晶</p>
          <h1 id="gameLevelTitle">初见玉结</h1>
          <span>旋转玉环，使缺口越过金扣，逐层巧解</span>
        </div>
        <div class="timer-pill">◷ <strong id="timerText">00:00</strong></div>
      </header>

      <main class="game-layout">
        <aside class="left-controls">
          <div class="step-tag">步数<br><strong id="movesText">0</strong></div>
        </aside>
        <section class="jade-stage" aria-label="玉环棋盘">
          <svg id="boardSvg" viewBox="0 0 900 1040" role="img" aria-label="玉环巧解棋盘"></svg>
          <div id="toast" class="toast" aria-live="polite"></div>
        </section>
        <aside class="right-controls">
          <button id="hintBtn" class="jewel-button"><span>💡</span>提示</button>
          <button id="resetBtn" class="jewel-button"><span>↻</span>重置</button>
          <button id="soundBtn" class="jewel-button"><span>♪</span>声音</button>
          <button id="exitBtn" class="jewel-button"><span>×</span>退出</button>
        </aside>
      </main>
      <p class="game-tip" id="gameTip">所有金扣已显示。先观察外层可转玉环，再让缺口精确越过发光金扣。</p>
    </section>

    <div id="completeModal" class="modal" aria-hidden="true">
      <div class="modal-card ornate-plaque">
        <div class="seal">吉</div>
        <h2>此结已解</h2>
        <p id="resultText">玉环轻转，万事圆满。</p>
        <div class="modal-actions"><button id="replayBtn">再解一次</button><button id="nextBtn">下一玉结</button></div>
      </div>
    </div>
  </div>

  <audio id="bgm" src="assets/bgm.mp3" loop preload="auto"></audio>
  <audio id="chime" src="assets/jade-chime.wav" preload="auto"></audio>
  <audio id="tapSound" src="assets/jade-tap.wav" preload="auto"></audio>
  <script src="levels.js"></script>
  <script src="game.js"></script>
</body>
</html>
