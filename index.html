<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#1f111b" />
  <title>玉环·巧解</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="backBtn" class="round-button" aria-label="上一关">‹</button>
      <div class="title-block">
        <div class="eyebrow" id="chapterName">桃天草莓晶</div>
        <h1>玉环·巧解</h1>
        <div class="level-name" id="levelName">桃花初结</div>
      </div>
      <button id="soundBtn" class="round-button" aria-label="声音">音</button>
    </header>

    <main>
      <section class="control-row" aria-label="游戏控制">
        <button id="hintBtn">提示</button>
        <button id="resetBtn">复原</button>
        <button id="selectBtn">选关</button>
      </section>

      <section class="game-frame">
        <div class="ornament ornament-left">✦</div>
        <div class="ornament ornament-right">✦</div>
        <canvas id="scene"></canvas>
        <div class="instruction">按住玉环左右滑动，让缺口完整越过金扣。</div>
        <div class="progress" id="progress">0 / 5</div>
      </section>
    </main>

    <div id="toast" class="toast" role="status"></div>

    <dialog id="levelDialog" class="modal">
      <button class="modal-close" data-close>×</button>
      <h2>章节选择</h2>
      <div id="levelGrid" class="level-grid"></div>
    </dialog>

    <dialog id="completeDialog" class="modal complete-modal">
      <div class="seal">巧</div>
      <h2>此结已解</h2>
      <p id="completeText">桃花初结</p>
      <div class="modal-actions">
        <button id="replayBtn">再解一次</button>
        <button id="nextBtn" class="primary">下一关</button>
      </div>
    </dialog>
  </div>

  <audio id="bgm" src="./assets/audio/bgm.mp3" loop preload="none"></audio>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
