<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#251c28" />
  <title>玉环·巧解</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="petals" aria-hidden="true"></div>
  <main id="app">
    <section id="home" class="screen active">
      <div class="home-shell">
        <div class="brand-row">
          <div class="seal">玉</div>
          <div>
            <p class="eyebrow">YU HUAN</p>
            <h1>玉环·巧解</h1>
          </div>
        </div>
        <p class="tagline">旋玉过扣，巧解连环。</p>
        <button id="continueBtn" class="primary">开始游戏</button>
        <button id="chapterBtn" class="secondary">章节选择</button>
        <div class="mini-note">所有金扣从开局即完整显示。拖动玉环管身，使缺口依次越过金扣。</div>
      </div>
    </section>

    <section id="chapters" class="screen">
      <header class="topbar">
        <button id="chaptersBack" class="round-btn">‹</button>
        <div><p class="eyebrow">CHAPTERS</p><h2>章节选择</h2></div>
        <span></span>
      </header>
      <div id="chapterGrid" class="chapter-grid"></div>
    </section>

    <section id="levels" class="screen">
      <header class="topbar">
        <button id="levelsBack" class="round-btn">‹</button>
        <div><p id="levelsEyebrow" class="eyebrow"></p><h2>关卡选择</h2></div>
        <span></span>
      </header>
      <div id="levelGrid" class="level-grid"></div>
    </section>

    <section id="gameScreen" class="screen">
      <header class="topbar game-topbar">
        <button id="gameBack" class="round-btn">‹</button>
        <div class="game-title"><p id="chapterName" class="eyebrow"></p><h2 id="levelName"></h2></div>
        <button id="soundBtn" class="round-btn">音</button>
      </header>
      <div class="hud">
        <span>转动 <b id="moves">0</b></span>
        <button id="hintBtn">提示</button>
        <button id="resetBtn">复原</button>
        <button id="chooseBtn">选关</button>
      </div>
      <div class="board-shell">
        <canvas id="game" width="900" height="1100"></canvas>
        <div id="toast" class="toast"></div>
        <div id="complete" class="complete">
          <div class="complete-card">
            <div class="seal large">解</div>
            <h3>巧解成功</h3>
            <p id="completeText"></p>
            <div class="complete-actions">
              <button id="replayBtn" class="secondary">重玩</button>
              <button id="nextBtn" class="primary">下一关</button>
            </div>
          </div>
        </div>
      </div>
      <p class="instruction">按住玉环管身左右滑动。缺口必须完整越过金扣中心，才能解除该扣。</p>
    </section>
  </main>
  <script src="levels.js"></script>
  <script src="game.js"></script>
</body>
</html>
