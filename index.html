<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0f2d29" />
  <title>玉环 · 巧解原型</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section id="gallery" class="screen active" aria-label="藏玉阁">
      <header class="hero">
        <div class="eyebrow">YU HUAN · 玉器巧解</div>
        <h1>藏玉阁</h1>
        <p>八玉入境，一环一解。每章首关均可试玩。</p>
      </header>
      <div id="chapterGrid" class="chapter-grid"></div>
      <footer class="gallery-foot">拖动玉环穿过金扣，逐层抽离。玩法参考传统解环与九连环的空间逻辑。</footer>
    </section>

    <section id="gameScreen" class="screen" aria-label="游戏">
      <header class="game-header">
        <button id="backBtn" class="round-btn" aria-label="返回">‹</button>
        <div class="title-stack">
          <div id="chapterName" class="eyebrow"></div>
          <h2 id="levelName">初见玉结</h2>
          <p id="quote"></p>
        </div>
        <button id="soundBtn" class="round-btn" aria-label="声音">音</button>
      </header>

      <div class="stats-row">
        <div class="pill"><span>动作</span><strong id="moves">0</strong></div>
        <button id="hintBtn" class="pill action">点拨</button>
        <button id="resetBtn" class="pill action">复原</button>
      </div>

      <section class="board-shell">
        <canvas id="game" width="900" height="1120" aria-label="玉环拆解棋盘"></canvas>
        <div id="toast" class="toast"></div>
      </section>
      <p class="instruction">按住环内移动整只玉环；按住玉环管身绕环心滑动可旋转。让缺口真正穿过金扣，再把玉环抽离。</p>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
