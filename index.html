<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eef7f2" />
  <title>玉环 · Jade Rings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button id="restartBtn" class="ghost">重置</button>
      <div class="titleWrap">
        <div class="title">玉环</div>
        <div class="subtitle">转一环，解一结</div>
      </div>
      <div id="levelText" class="level">第一关</div>
    </header>

    <section class="stageWrap">
      <div class="mist mist1"></div>
      <div class="mist mist2"></div>
      <canvas id="game"></canvas>
      <div id="message" class="message">轻触玉环，沿圆周拖动</div>
    </section>

    <footer class="bottom">
      <button id="nextBtn" class="primary hidden">下一关</button>
      <div class="hint">开口对准金扣方向后，玉环会自动解开</div>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
