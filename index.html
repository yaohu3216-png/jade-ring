<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#7f505d" />
  <title>玉环 2.0 Alpha</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">YU HUAN · 2.0 ALPHA</div>
        <h1>玉环</h1>
        <p id="subtitle">玉环轻转，万事圆满。</p>
      </div>
      <div class="controls">
        <button id="soundBtn" class="pill">叮当：开</button>
        <button id="musicBtn" class="pill">音乐：关</button>
      </div>
    </header>

    <section class="hud">
      <div><span>关卡</span><strong id="levelText">1 / 8</strong></div>
      <div><span>步数</span><strong id="movesText">0</strong></div>
      <div><span>时间</span><strong id="timeText">00:00</strong></div>
      <button id="resetBtn" class="reset">重置</button>
    </section>

    <section class="stage-wrap">
      <canvas id="game" aria-label="玉环解谜游戏"></canvas>
      <div id="toast" class="toast"></div>
      <div id="complete" class="complete hidden">
        <div class="seal">吉</div>
        <h2>此结已解</h2>
        <p id="resultText"></p>
        <button id="nextBtn">下一玉结</button>
      </div>
    </section>

    <footer>
      <p>拖动玉环旋转。只有相连玉环的缺口真正口对口，金扣才会松开。</p>
      <div class="legend"><i class="dot half"></i>单侧对准　<i class="dot full"></i>口对口</div>
    </footer>
  </main>
  <audio id="bgm" src="assets/bgm.mp3" loop preload="auto"></audio>
  <script src="src/levels.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
