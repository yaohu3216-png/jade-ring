<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#182b2a">
<title>玉环 V6.6</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header>
    <button id="restart">重置</button>
    <div class="brand"><b>玉 环</b><span>月下解玉结</span></div>
    <div class="audio-controls">
      <button id="sound" aria-label="音效">叮当：开</button>
      <button id="music" aria-label="音乐">音乐：关</button>
    </div>
  </header>

  <section id="stage" class="stage">
    <canvas id="game"></canvas>
    <div id="levelName" class="level-name"></div>
    <div id="hint" class="hint">转动玉环，让缺口经过金扣</div>
  </section>

  <footer><button id="next" class="next hidden">下一关</button></footer>

  <!-- 将你合法取得的音乐文件命名为 hetang-yuese.mp3，放进 assets 文件夹 -->
  <audio id="bgm" src="assets/hetang-yuese.mp3" loop preload="none"></audio>
</main>
<script src="game.js"></script>
</body>
</html>
