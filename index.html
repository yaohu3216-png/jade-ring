<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>玉环·巧解</title><link rel="stylesheet" href="style.css"></head><body><main>
<section id="home" class="page active"><div class="hero"><small>YU HUAN · 巧解玉环</small><h1>玉 环</h1><p>循隙抽环，解尽千结。</p><button id="enter">进入藏玉阁</button></div></section>
<section id="levels" class="page"><header><button id="backHome">‹</button><div><small>第一季 · 八玉华章</small><h2>藏 玉 阁</h2></div><i></i></header><nav id="tabs"></nav><div id="grid"></div></section>
