<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#1b101c" />
  <title>玉环·巧解</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">桃夭草莓晶 · 第一章</p>
        <h1>玉环·巧解</h1>
      </div>
      <button id="soundBtn" class="round-btn" aria-label="声音">音</button>
    </header>

    <section class="hud">
      <button id="prevBtn">‹</button>
      <div class="level-copy">
        <span id="levelNo">第 1 关</span>
        <strong id="levelName">桃花初结</strong>
      </div>
      <div class="actions">
        <button id="hintBtn">提示</button>
        <button id="resetBtn">复原</button>
        <button id="nextBtn">选关</button>
      </div>
    </section>

    <section class="stage-shell">
      <canvas id="scene"></canvas>
      <div class="stage-vignette"></div>
      <div id="toast" class="toast" aria-live="polite"></div>
      <div id="complete" class="complete hidden">
        <div class="complete-card">
          <span>巧解成功</span>
          <h2 id="completeTitle">桃花初结</h2>
          <p>玉环尽解，花影自开。</p>
          <button id="continueBtn">下一关</button>
        </div>
      </div>
    </section>

    <footer>
      <p id="instruction">按住玉环左右滑动。让缺口完整越过金扣，按正确顺序逐一解开。</p>
      <div class="legend"><span class="dot active"></span>可解金扣 <span class="dot dormant"></span>后续金扣</div>
    </footer>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
